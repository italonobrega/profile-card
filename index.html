<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Card de Perfil</title>
  </head>
  <body>
    <div class="card">
      <div class="avatar">
        <img src="assets/italo-photo.png" alt="Foto de Ítalo" />
      </div>

      <h1>Ítalo Dev</h1>

      <p class="cargo">Desenvolvedor Front-end • Recife, PE</p>

      <p class="bio">
        Faço sites e landing pages pra pequenos negócios. Foco em design limpo e
        resultado real.
      </p>

      <div class="section-title">SKILLS</div>

      <div class="skills">
        <span class="skill"> <i class="fa-brands fa-html5"></i> HTML </span>
        <span class="skill"> <i class="fa-brands fa-css3-alt"></i> CSS </span>
        <span class="skill"> <i class="fa-brands fa-js"></i> JavaScript </span>
        <span class="skill"> <i class="fa-brands fa-git-alt"></i> Git </span>
      </div>

      <div class="section-title">GITHUB</div>

      <div class="github-stats">
        <div class="github-card">
          <span class="github-number" id="repos">--</span>
          <p>Repositórios</p>
        </div>

        <div class="github-card">
          <span class="github-number" id="seguidores">--</span>
          <p>Seguidores</p>
        </div>
      </div>

      <hr />

      <div class="social">
        <a href="#" class="btn-whatsapp">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
        <a
          href="https://github.com/italonobrega"
          target="_blank"
          rel="noopener noreferrer"
        >
          <i class="fa-brands fa-github"></i> GitHub
        </a>
        <a href="#"> <i class="fa-solid fa-envelope"></i> Email </a>
      </div>
    </div>

    <script src="js/main.js"></script>
  </body>
</html>
