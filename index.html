<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Card de Perfil</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #121212; /* Fundo levemente mais suave que o preto puro */
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 620px;
        background: #f8f9fa;
        padding: 50px;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4); /* Sombra para dar destaque */
      }

      .avatar {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: #c8c2f0;
        color: #433a91;
        font-size: 3rem;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 25px;
        overflow: hidden;
        border: 4px solid #fff; /* Borda branca ao redor do avatar */
        box-shadow: 0 8px 20px rgba(67, 58, 145, 0.2);
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        text-align: center;
        font-size: 2.2rem;
        margin-bottom: 8px;
        color: #1a1a1a;
      }

      .cargo {
        text-align: center;
        font-size: 1.1rem;
        color: #666;
        margin-bottom: 30px;
        font-weight: 500;
      }

      .bio {
        background: #ffffff;
        border: 1px solid #eaeaea;
        padding: 25px;
        border-radius: 16px;
        text-align: left;
        color: #444;
        font-size: 1.1rem;
        line-height: 1.7;
        margin: 35px 0;
        box-shadow: 0 4px 10px rgba(0,0,0,0.02);
      }

      .section-title {
        text-align: left;
        color: #888;
        font-size: 1rem;
        font-weight: bold;
        margin-bottom: 15px;
        letter-spacing: 1.5px;
      }

      .skills {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 40px;
      }

      .skill {
        background: #ffffff;
        border: 1px solid #d6d3cb;
        padding: 10px 16px;
        border-radius: 12px;
        font-size: 1.05rem;
        display: flex;
        gap: 8px;
        align-items: center;
        color: #333;
        transition: all 0.3s ease;
      }

      .skill:hover {
        background: #f0f0f0;
        transform: translateY(-2px);
      }

      .github-stats {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
      }

      .github-card {
        flex: 1;
        background: #ffffff;
        border: 1px solid #eaeaea;
        border-radius: 16px;
        padding: 25px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .github-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      }

      .github-number {
        display: block;
        font-size: 2.8rem;
        font-weight: bold;
        color: #433a91; /* Cor combinando com o tema do avatar */
        margin-bottom: 5px;
      }

      .github-card p {
        color: #666;
        font-size: 1rem;
        font-weight: 500;
      }

      hr {
        border: none;
        height: 1px;
        background: #e0e0e0;
        margin-bottom: 35px;
      }

      .social {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
      }

      .social a {
        text-decoration: none;
        color: #333;
        background: #fff;
        border: 1px solid #dcdcdc;
        border-radius: 12px;
        padding: 14px 24px;
        font-size: 1.05rem;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 150px;
        justify-content: center;
        transition: all 0.3s ease;
        box-shadow: 0 2px 5px rgba(0,0,0,0.02);
      }

      .social a:hover {
        background: #f4f4f4;
        transform: translateY(-3px);
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      }

      .social a.btn-whatsapp {
        background: #25d366 ;
        color: white;
        border: none;
      }

      .social a.btn-whatsapp:hover {
        background: #20bd5a;
      }

      @media (max-width: 480px) {
        .card {
          padding: 30px 20px;
        }
        .avatar {
          width: 110px;
          height: 110px;
          font-size: 2.5rem;
        }
        h1 {
          font-size: 1.8rem;
        }
        .github-stats {
          flex-direction: column;
          gap: 15px;
        }
        .social {
          flex-direction: column;
        }
        .social a {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">
        <img src="italo-photo.png" alt="Foto de Ítalo" />
      </div>

      <h1>Ítalo Dev</h1>

      <p class="cargo">Desenvolvedor Front-end • Recife, PE</p>

      <p class="bio">
        Faço sites e landing pages pra pequenos negócios. Foco em design limpo e resultado real.
      </p>

      <div class="section-title">SKILLS</div>

      <div class="skills">
        <span class="skill">
          <i class="fa-brands fa-html5"></i> HTML
        </span>
        <span class="skill">
          <i class="fa-brands fa-css3-alt"></i> CSS
        </span>
        <span class="skill">
          <i class="fa-brands fa-js"></i> JavaScript
        </span>
        <span class="skill">
          <i class="fa-brands fa-git-alt"></i> Git
        </span>
      </div>

      <div class="section-title">GITHUB</div>

      <div class="github-stats">
        <div class="github-card">
          <span class="github-number" id="repos">--</span>
          <p>Repositórios</p>
        </div>

        <div class="github-card">
          <span class="github-number" id="seguidores">--</span>
          <p>Seguidores</p>
        </div>
      </div>

      <hr />

      <div class="social">
        <a href="#" class="btn-whatsapp">
          <i class="fa-brands fa-whatsapp"></i> WhatsApp
        </a>
        <a href="https://github.com/italonobrega" target="_blank" rel="noopener noreferrer">
          <i class="fa-brands fa-github"></i> GitHub
        </a>
        <a href="#">
          <i class="fa-solid fa-envelope"></i> Email
        </a>
      </div>
    </div>

    <script>
      const usuarioGithub = "italonobrega"; 

      // Busca dados púlicos do usuário na API do GitHub
      fetch(`https://api.github.com/users/${usuarioGithub}`)
        .then(response => {
          if (!response.ok) throw new Error('Erro na requisição');
          return response.json();
        })
        .then(data => {
          document.getElementById("repos").textContent = data.public_repos;
          document.getElementById("seguidores").textContent = data.followers;
        })
        .catch(error => {
          console.error("Erro ao carregar dados:", error);
          document.getElementById("repos").textContent = "!";
          document.getElementById("seguidores").textContent = "!";
        });
    </script>
  </body>
</html>
