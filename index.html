<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <title>Card de Perfil</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        padding: 20px;
      }

      .card {
        width: 100%;
        max-width: 620px;
        background: #f5f5f5;
        padding: 50px;
        border-radius: 22px;
      }

      .avatar {
        width: 130px;
        height: 130px;
        border-radius: 50%;
        background: #c8c2f0;
        color: #433a91;
        font-size: 3rem;
        font-weight: bold;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0 auto 25px;
        overflow: hidden;
      }

      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      h1 {
        text-align: center;
        font-size: 2rem;
        margin-bottom: 8px;
        color: #111;
      }

      .cargo {
        text-align: center;
        font-size: 1.3rem;
        color: #555;
        margin-bottom: 30px;
      }

      .bio {
        background: #eceae4;
        padding: 25px;
        border-radius: 16px;
        text-align: left;
        color: #555;
        font-size: 1.1rem;
        line-height: 1.8;
        margin: 35px 0;
      }

      .stats {
        display: flex;
        justify-content: space-around;
        margin-bottom: 35px;
      }

      .stat h2 {
        font-size: 2rem;
        color: #111;
      }

      .stat-num {
        display: block;
        font-size: 2rem;
        font-weight: bold;
        color: #111;
      }

      .stat p {
        color: #555;
        margin-top: 5px;
      }

      hr {
        border: none;
        height: 1px;
        background: #d9d9d9;
        margin-bottom: 35px;
      }

      .social {
        display: flex;
        gap: 15px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .social a {
        text-decoration: none;
        color: #222;
        border: 2px solid #cfcfcf;
        border-radius: 15px;
        padding: 14px 24px;
        font-size: 1.1rem;
        display: flex;
        align-items: center;
        gap: 10px;
        transition: 0.3s;
      }

      .social a i {
        font-size: 1.4rem;
      }

      .section-title {
        text-align: left;
        color: #777;
        font-size: 1.4rem;
        margin-bottom: 20px;
        letter-spacing: 1px;
      }

      .skills {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 40px;
      }

      .skill {
        background: #eceae4;
        border: 2px solid #d6d3cb;
        padding: 12px 18px;
        border-radius: 14px;
        font-size: 1.1rem;
        display: flex;
        gap: 8px;
        align-items: center;
      }

      .social a:hover {
        background: #e8e8e8;
        transform: translateY(-2px);
      }

      .github-stats {
        display: flex;
        gap: 20px;
        margin-bottom: 40px;
      }

      .github-card {
        flex: 1;
        background: #eceae4;
        border-radius: 16px;
        padding: 30px;
      }

      .github-number {
        display: block;
        font-size: 3rem;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .social {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 15px;
      }

      .social a {
        min-width: 160px;
      }

      .btn-whatsapp {
        background: #25d366;
        color: white !important;
        border: none !important;
      }

      @media (max-width: 480px) {
        .card {
          padding: 30px 20px;
        }

        .avatar {
          width: 110px;
          height: 110px;
          font-size: 2.5rem;
        }

        h1 {
          font-size: 1.7rem;
        }

        .cargo {
          font-size: 1.1rem;
        }

        .stats {
          gap: 15px;
        }

        .stat h2 {
          font-size: 1.6rem;
        }

        .social {
          flex-direction: column;
        }

        .social a {
          justify-content: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="avatar">
        <img src="italo-photo.png" alt="Foto de Ítalo" />
      </div>

      <h1>Ítalo Dev</h1>

      <p class="cargo">Desenvolvedor Front-end • Recife, PE</p>

      <p class="bio">
        Faço sites e landing pages pra pequenos negócios. Foco em design limpo e
        resultado real.
      </p>

      <div class="section-title">SKILLS</div>

      <div class="skills">
        <span class="skill">
          <i class="fa-brands fa-html5"></i>
          HTML
        </span>

        <span class="skill">
          <i class="fa-brands fa-css3-alt"></i>
          CSS
        </span>

        <span class="skill">
          <i class="fa-brands fa-js"></i>
          JavaScript
        </span>

        <span class="skill">
          <i class="fa-brands fa-git-alt"></i>
          Git
        </span>
      </div>

      <div class="section-title">GITHUB</div>

      <div class="github-stats">
        <div class="github-card">
          <span class="github-number" id="repos">--</span>
          <p>Repositórios</p>
        </div>

        <div class="github-card">
          <span class="github-number" id="seguidores">--</span>
          <p>Seguidores</p>
        </div>
      </div>

      <hr />

      <div class="social">
        <a href="#" class="btn-whatsapp">
          <i class="fa-brands fa-whatsapp"></i>
          WhatsApp
        </a>

        <a href="#">
          <i class="fa-brands fa-github"></i>
          GitHub
        </a>

        <a href="#">
          <i class="fa-solid fa-envelope"></i>
          Email
        </a>
      </div>
    </div>
    <script>
      const usuarioGithub = "italonobrega"; // troque pelo seu usuário

      fetch(`https://api.github.com/users/${usuarioGithub}`)
        .then((response) => response.json())
        .then((data) => {
          document.getElementById("repos").textContent = data.public_repos;

          document.getElementById("seguidores").textContent = data.followers;
        })
        .catch(() => {
          document.getElementById("repos").textContent = "?";
          document.getElementById("seguidores").textContent = "?";
        });
    </script>
  </body>
</html>
